# GitHub Actions는 Cloudflare에 의해 차단되어 사용하지 않습니다.
# 모니터링은 Mac 로컬 launchd에서 실행됩니다.
# 참고: setup_local.sh 실행으로 Mac에 설치됩니다.

name: 진에어 취소표 모니터링 (비활성)

on:
  workflow_dispatch:  # 수동 실행만 허용 (자동 스케줄 없음)

jobs:
  notice:
    runs-on: ubuntu-latest
    steps:
      - name: 안내
        run: echo "이 모니터링은 Mac 로컬(launchd)에서 실행됩니다. jinair.com이 Cloudflare로 보호되어 GitHub Actions IP가 차단됩니다."
